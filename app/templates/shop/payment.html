{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-lg mx-auto border-0" style="max-width: 500px;">
        <div class="card-header bg-primary text-white py-3">
            <h4 class="mb-0"><i class="bi bi-credit-card"></i> Confirmar Pago</h4>
        </div>
        <div class="card-body p-5">
            <h5 class="card-title mb-4">Orden #{{ order.id }} generada</h5>

            <p class="lead">Total a pagar:</p>
            <h2 class="display-4 fw-bold text-primary mb-4">${{ order.total_price }}</h2>

            <p class="text-muted mb-4">Vas a ser redirigido a MercadoPago para finalizar la compra de forma segura.</p>

            <div id="wallet_container"></div>

            <hr class="my-4">

            <a href="{{ url_for('shop.view_cart') }}" class="text-decoration-none text-secondary">
                <i class="bi bi-arrow-left"></i> Volver al carrito (Cancelar)
            </a>
        </div>
    </div>
</div>

<script src="https://sdk.mercadopago.com/js/v2"></script>
<script>
    const mp = new MercadoPago("{{ config['MP_PUBLIC_KEY'] or 'TEST-TU-PUBLIC-KEY' }}", {
        locale: 'es-AR'
    });

    mp.bricks().create("wallet", "wallet_container", {
        initialization: {
            preferenceId: "{{ preference_id }}",
        },
        customization: {
            texts: {
                action: 'buy',
                valueProp: 'security_details',
            },
        },
    });
</script>
{% endblock %}
