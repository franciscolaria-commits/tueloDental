{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4>{{ action }} Producto</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label>Nombre del Producto</label>
                            <input type="text" name="name" class="form-control"
                                value="{{ product.name if product else '' }}" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Precio ($)</label>
                                <input type="number" step="0.01" name="price" class="form-control"
                                    value="{{ product.price if product else '' }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Stock Inicial</label>
                                <input type="number" name="stock" class="form-control"
                                    value="{{ product.stock if product else '' }}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>URL de la Imagen</label>
                            <input type="text" name="image_url" class="form-control"
                                value="{{ product.image_url if product else '' }}" placeholder="http://...">
                            <small class="text-muted">Por ahora pegá una URL de Google Images.</small>
                        </div>
                        <div class="mb-3">
                            <label>Descripción</label>
                            <textarea name="description" class="form-control"
                                rows="3">{{ product.description if product else '' }}</textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Guardar</button>
                            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
